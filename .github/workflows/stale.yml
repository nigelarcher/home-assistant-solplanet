---

name: Close stale issues

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 14
          days-before-close: 0

          exempt-issue-labels: pinned

